<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pre-Interview AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-void:    #05070E;
        --bg-deep:    #080C16;
        --bg-surface: #0D1424;
        --bg-raised:  #121B30;
        --border:     rgba(255,255,255,0.06);
        --border-gold:rgba(201,168,76,0.25);
        --gold:       #C9A84C;
        --gold-bright:#E8C96A;
        --gold-dim:   #8A6F30;
        --gold-glow:  rgba(201,168,76,0.12);
        --platinum:   #E2E8F2;
        --silver:     #8FA3C4;
        --muted:      #445570;
        --success:    #2ECC71;
        --error:      #E74C3C;
        --info:       #3A8FE8;
        --font-display: 'Cormorant Garamond', Georgia, serif;
        --font-body:    'DM Sans', system-ui, sans-serif;
        --font-mono:    'JetBrains Mono', monospace;
      }
      /* light theme overrides */
      body[data-theme="light"] {
        --bg-void:    #f0f2f5;
        --bg-deep:    #ffffff;
        --bg-surface: #ffffff;
        --bg-raised:  #f7f8fa;
        --border:     rgba(0,0,0,0.1);
        --platinum:   #111;
        --muted:      #667;
      }
      /* theme toggle button */
      .theme-toggle-btn {
        background: transparent;
        border: none;
        color: var(--platinum);
        font-size: 20px;
        cursor: pointer;
        padding: 6px;
        border-radius: 50%;
        transition: background 0.2s;
      }
      .theme-toggle-btn:hover { background: rgba(255,255,255,0.1); }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        background: var(--bg-void);
        color: var(--platinum);
        font-family: var(--font-body);
        font-size: 15px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 50% at 20% 10%, rgba(201,168,76,0.04) 0%, transparent 60%),
          radial-gradient(ellipse 60% 40% at 80% 90%, rgba(58,143,232,0.03) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
      }
      input, select, textarea, button { font-family: var(--font-body); }
      ::selection { background: rgba(201,168,76,0.25); color: var(--platinum); }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: var(--bg-deep); }
      ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse-gold {
        0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.4); }
        50%       { box-shadow: 0 0 0 10px rgba(201,168,76,0); }
      }
      @keyframes ripple {
        0%   { transform: scale(0.8); opacity: 1; }
        100% { transform: scale(2.4); opacity: 0; }
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; } 50% { opacity: 0; }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-0XgB-1x9.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
